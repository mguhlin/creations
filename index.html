<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MGuhlin.org — Creations</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --forest:        #2D6A4F;
  --forest-deep:   #1B4332;
  --forest-mid:    #40916C;
  --forest-light:  #74C69D;
  --forest-pale:   #B7E4C7;
  --forest-faint:  #D8F3DC;
  --charcoal:      #3D4146;
  --charcoal-mid:  #4A4F55;
  --charcoal-soft: #585E65;
  --charcoal-dim:  #5A5F64;
  --charcoal-mute: #8A9099;
  --cream:         #F2EFE9;
  --white:         #FFFFFF;
  --gold:          #D4AC0D;
  --gold-light:    #F1C40F;
  --border-dark:   rgba(116,198,157,0.15);
  --border-mid:    rgba(116,198,157,0.08);
  --sidebar-w:     240px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: #F2F5F2;
  color: #1B3028;
  font-family: 'DM Sans', sans-serif;
  line-height: 1.65;
  overflow-x: hidden;
}

/* ─── NOISE TEXTURE OVERLAY ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.6;
}

/* ─── LEFT SIDEBAR ─── */
.sidebar {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: var(--sidebar-w);
  z-index: 200;
  background: #060E09;
  border-right: 2px solid rgba(116,198,157,0.35);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(116,198,157,0.3) transparent;
  transition: transform 0.3s ease;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(116,198,157,0.2); border-radius: 4px; }

.sidebar-brand {
  display: block;
  padding: 24px 20px 20px;
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  font-weight: 700;
  color: #D8F3DC;
  text-decoration: none;
  border-bottom: 1px solid rgba(116,198,157,0.25);
}
.sidebar-brand span { color: #74C69D; }

.sidebar-section-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.66rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #52B788;
  padding: 20px 20px 6px;
}
.sidebar-nav {
  display: flex;
  flex-direction: column;
  padding: 4px 10px;
  gap: 1px;
  flex: 1;
}
.sidebar-nav a {
  display: flex;
  align-items: center;
  gap: 8px;
  color: #C8E6D4;
  text-decoration: none;
  font-size: 0.82rem;
  font-weight: 500;
  padding: 8px 10px;
  border-radius: 6px;
  transition: background 0.15s, color 0.15s;
  line-height: 1.3;
}
.sidebar-nav a:hover {
  background: rgba(116,198,157,0.18);
  color: #FFFFFF;
}
.sidebar-nav a .pnum {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  color: #74C69D;
  opacity: 1;
  flex-shrink: 0;
  width: 22px;
}
.sidebar-nav .nav-section-break {
  height: 1px;
  background: rgba(116,198,157,0.22);
  margin: 8px 10px;
}

.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid rgba(116,198,157,0.25);
  margin-top: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.sidebar-footer a {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: #74C69D;
  opacity: 0.9;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: opacity 0.2s;
}
.sidebar-footer a:hover { opacity: 1; color: #B7E4C7; }

/* ─── HAMBURGER TOGGLE (mobile only) ─── */
.menu-toggle {
  display: none;
  position: fixed;
  top: 14px; left: 14px;
  z-index: 300;
  width: 42px; height: 42px;
  border-radius: 8px;
  background: rgba(27,67,50,0.96);
  backdrop-filter: blur(14px);
  border: 1px solid var(--border-dark);
  cursor: pointer;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.menu-toggle span {
  display: block;
  width: 20px; height: 2px;
  background: var(--forest-light);
  border-radius: 2px;
  transition: transform 0.25s, opacity 0.25s;
}
.menu-toggle.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.menu-toggle.active span:nth-child(2) { opacity: 0; }
.menu-toggle.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* Overlay behind sidebar on mobile */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 190;
  background: rgba(0,0,0,0.5);
  opacity: 0;
  transition: opacity 0.3s;
}
.sidebar-overlay.visible { opacity: 1; }

/* ─── MAIN WRAPPER (offset for sidebar) ─── */
.page-wrap {
  margin-left: var(--sidebar-w);
  position: relative;
  z-index: 1;
  min-height: 100vh;
}

/* ─── HERO ─── */
.hero {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 80px 32px;
  background-color: #0F2318;
  background-image:
    radial-gradient(ellipse 70% 55% at 50% 40%, rgba(45,106,79,0.40) 0%, transparent 65%),
    radial-gradient(ellipse 40% 40% at 15% 75%, rgba(27,67,50,0.55) 0%, transparent 55%),
    radial-gradient(ellipse 30% 35% at 85% 20%, rgba(64,145,108,0.20) 0%, transparent 50%);
}
.hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(116,198,157,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(116,198,157,0.04) 1px, transparent 1px);
  background-size: 56px 56px;
  pointer-events: none;
}
.hero-inner { position: relative; z-index: 1; max-width: 820px; }
.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(45,106,79,0.2);
  border: 1px solid rgba(116,198,157,0.3);
  border-radius: 100px;
  padding: 6px 18px;
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--forest-light);
  margin-bottom: 36px;
  animation: fadeDown 0.7s ease both;
}
.hero-eyebrow::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--forest-light);
  animation: pulse 2.5s ease infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}
.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(3rem, 8vw, 6.5rem);
  font-weight: 900;
  line-height: 0.95;
  color: var(--cream);
  letter-spacing: -0.025em;
  margin-bottom: 10px;
  animation: fadeDown 0.7s 0.1s ease both;
}
.hero-title em { font-style: italic; color: var(--forest-light); }
.hero-byline {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.1rem, 2.5vw, 1.6rem);
  font-weight: 700;
  color: var(--forest-pale);
  opacity: 0.7;
  margin-bottom: 28px;
  animation: fadeDown 0.7s 0.18s ease both;
}
.hero-desc {
  font-size: 1rem;
  color: rgba(212,228,199,0.75);
  max-width: 560px;
  margin: 0 auto 52px;
  line-height: 1.75;
  font-weight: 300;
  animation: fadeDown 0.7s 0.25s ease both;
}
.hero-link {
  margin-bottom: 40px;
  animation: fadeDown 0.7s 0.28s ease both;
}
.hero-link a {
  font-family: 'DM Mono', monospace;
  font-size: 0.82rem;
  color: var(--forest-light);
  text-decoration: none;
  padding: 8px 20px;
  border: 1px solid rgba(116,198,157,0.3);
  border-radius: 100px;
  transition: background 0.2s, color 0.2s;
}
.hero-link a:hover {
  background: rgba(116,198,157,0.15);
  color: var(--forest-pale);
}
.hero-tally {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
  margin-bottom: 60px;
  animation: fadeDown 0.7s 0.32s ease both;
}
.tally-item { text-align: center; }
.tally-num {
  font-family: 'Playfair Display', serif;
  font-size: 2.8rem;
  font-weight: 700;
  color: var(--forest-light);
  line-height: 1;
  display: block;
}
.tally-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(183,228,199,0.7);
  margin-top: 4px;
}
.tally-divider { width: 1px; background: rgba(116,198,157,0.15); align-self: stretch; }
.hero-scroll {
  animation: fadeDown 0.7s 0.38s ease both;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(116,198,157,0.5);
}
.scroll-ring {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: 1px solid rgba(116,198,157,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  animation: bounceDown 2.2s ease infinite;
}
@keyframes bounceDown {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(7px); }
}
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-18px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ─── SECTION DIVIDER ─── */
.sec-divider {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 60px 32px 0;
  max-width: 1200px;
  margin: 0 auto;
}
.sec-divider-line { flex: 1; height: 1px; background: rgba(27,67,50,0.15); }
.sec-divider-lbl {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #40916C;
}

/* ─── SLIDES ─── */
.slides-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 24px 80px;
  display: flex;
  flex-direction: column;
  gap: 32px;
}
.slide {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid rgba(27,67,50,0.14);
  background: #FFFFFF;
  box-shadow: 0 2px 16px rgba(27,67,50,0.08);
  display: grid;
  grid-template-columns: 320px 1fr;
  min-height: 300px;
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 0.6s ease, transform 0.6s ease;
  scroll-margin-top: 24px;
}
.slide.visible { opacity: 1; transform: translateY(0); }
.slide:hover {
  border-color: rgba(27,67,50,0.28);
  box-shadow: 0 12px 48px rgba(27,67,50,0.16);
}
.slide-panel {
  position: relative;
  padding: 40px 36px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  overflow: hidden;
}
.slide-content {
  padding: 40px 44px 40px 40px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  background: #FFFFFF;
  border-left: 1px solid rgba(27,67,50,0.10);
}
.slide-wm {
  position: absolute;
  bottom: -24px; right: -10px;
  font-family: 'Playfair Display', serif;
  font-size: 8rem;
  font-weight: 900;
  line-height: 1;
  opacity: 0.06;
  color: var(--white);
  pointer-events: none;
  user-select: none;
}
.slide-cat {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 3px;
  display: inline-block;
  margin-bottom: 18px;
  align-self: flex-start;
}
.slide-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  font-weight: 900;
  line-height: 1.1;
  color: var(--white);
  margin-bottom: 8px;
}
.slide-sub {
  font-size: 0.8rem;
  opacity: 0.6;
  font-style: italic;
  line-height: 1.4;
}
.slide-stat { margin-top: auto; padding-top: 20px; }
.slide-stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 2.4rem;
  font-weight: 700;
  line-height: 1;
}
.slide-stat-lbl {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  opacity: 0.55;
  margin-top: 3px;
}
.slide-desc {
  font-size: 0.9rem;
  color: #2D3D35;
  line-height: 1.75;
  margin-bottom: 22px;
  font-weight: 400;
}
.slide-features {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-bottom: 28px;
}
.feat-chip {
  font-size: 0.72rem;
  padding: 4px 11px;
  border-radius: 100px;
  border: 1px solid rgba(27,67,50,0.22);
  color: #1B4332;
  background: rgba(45,106,79,0.08);
}
.slide-actions {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}
.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 10px 22px;
  border-radius: 8px;
  font-size: 0.82rem;
  font-weight: 600;
  text-decoration: none;
  transition: filter 0.2s, transform 0.15s;
  letter-spacing: 0.02em;
}
.btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 0.8rem;
  font-weight: 500;
  text-decoration: none;
  border: 1px solid rgba(27,67,50,0.28);
  color: #1B4332;
  transition: all 0.2s;
}
.btn-secondary:hover {
  background: rgba(27,67,50,0.08);
  color: #0F2318;
  border-color: rgba(27,67,50,0.5);
}

/* ─── BACK TO TOP ─── */
#back-to-top {
  position: fixed;
  bottom: 28px; right: 28px;
  z-index: 300;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--forest);
  border: 1px solid rgba(116,198,157,0.3);
  display: flex; align-items: center; justify-content: center;
  color: var(--forest-pale);
  font-size: 1.1rem;
  cursor: pointer;
  text-decoration: none;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.3s, transform 0.3s, background 0.2s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
#back-to-top.visible { opacity: 1; transform: translateY(0); }
#back-to-top:hover { background: var(--forest-mid); }

/* ─── FOOTER ─── */
footer {
  position: relative; z-index: 1;
  background: var(--forest-deep);
  border-top: 1px solid rgba(116,198,157,0.12);
  padding: 36px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.footer-brand { font-family: 'Playfair Display', serif; font-size: 0.95rem; color: var(--forest-pale); }
.footer-brand span { color: var(--forest-light); font-style: italic; }
.footer-links { display: flex; gap: 20px; flex-wrap: wrap; }
.footer-links a { font-size: 0.78rem; color: rgba(183,228,199,0.45); text-decoration: none; transition: color 0.15s; }
.footer-links a:hover { color: var(--forest-pale); }
.footer-copy { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: rgba(116,198,157,0.3); letter-spacing: 0.06em; }

/* ─── LOADING STATE ─── */
#loading {
  position: fixed; inset: 0; z-index: 500;
  background: var(--charcoal);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
  transition: opacity 0.4s;
}
#loading.hidden { opacity: 0; pointer-events: none; }
.loading-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--forest-light);
  display: inline-block; margin: 0 4px;
  animation: ldot 1.2s ease infinite;
}
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes ldot {
  0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1.1); opacity: 1; }
}
.loading-lbl { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(116,198,157,0.4); }

/* ─── RESPONSIVE ─── */

/* Tablet: narrower sidebar */
@media (max-width: 1080px) {
  :root { --sidebar-w: 210px; }
}

/* Mobile: sidebar off-canvas */
@media (max-width: 860px) {
  :root { --sidebar-w: 260px; }

  .menu-toggle { display: flex; }
  .sidebar-overlay { display: block; }

  .sidebar {
    transform: translateX(-100%);
  }
  .sidebar.open {
    transform: translateX(0);
  }

  .page-wrap {
    margin-left: 0;
  }

  .hero { padding: 70px 20px 60px; }

  .slide { grid-template-columns: 1fr; min-height: auto; }
  .slide-content { border-left: none; border-top: 1px solid rgba(116,198,157,0.08); padding: 28px 24px; }
  .slide-panel { padding: 28px 24px 24px; min-height: 180px; }

  footer { padding: 24px 20px; flex-direction: column; align-items: flex-start; gap: 12px; }
}

@media (max-width: 520px) {
  .hero-tally { gap: 20px; }
  .slides-container { padding: 20px 16px 60px; }
}
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading">
  <div>
    <span class="loading-dot"></span>
    <span class="loading-dot"></span>
    <span class="loading-dot"></span>
  </div>
  <div class="loading-lbl">Loading projects</div>
</div>

<!-- Mobile hamburger -->
<button class="menu-toggle" id="menu-toggle" aria-label="Toggle navigation">
  <span></span><span></span><span></span>
</button>

<!-- Mobile overlay -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- Left sidebar — populated by JS -->
<aside class="sidebar" id="sidebar">
  <a href="#top" class="sidebar-brand">MG<span>uhlin</span>.org</a>
  <div class="sidebar-section-label">Projects</div>
  <nav class="sidebar-nav" id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <a href="https://go.mgpd.org/aic" target="_blank" rel="noopener">go.mgpd.org/aic</a>
    <a href="#top">↑ Back to top</a>
  </div>
</aside>

<!-- Page content wrapper -->
<div class="page-wrap">

  <!-- Hero -->
  <section class="hero" id="top">
    <div class="hero-inner">
      <div class="hero-eyebrow">MGuhlin.org · Digital Creations</div>
      <h1 class="hero-title">Creative<br><em>Works</em></h1>
      <p class="hero-byline" id="hero-byline"></p>
      <p class="hero-desc" id="hero-desc"></p>
      <p class="hero-link"><a href="https://go.mgpd.org/aic" target="_blank" rel="noopener">go.mgpd.org/aic</a></p>
      <div class="hero-tally" id="hero-tally"></div>
      <div class="hero-scroll">
        <span>Explore Projects</span>
        <div class="scroll-ring">↓</div>
      </div>
    </div>
  </section>

  <!-- Main slides -->
  <main id="main-content"></main>

  <!-- Footer -->
  <footer id="site-footer"></footer>

</div><!-- /.page-wrap -->

<!-- Back to top -->
<a href="#top" id="back-to-top" title="Back to top">↑</a>

<script>
/* ═══════════════════════════════════════════════
   RENDERER — reads projects.json, builds the page
   ═══════════════════════════════════════════════ */

async function loadAndRender() {
  let data;
  try {
    const res = await fetch('projects.json?v=' + Date.now());
    if (!res.ok) throw new Error('fetch failed');
    data = await res.json();
  } catch (e) {
    document.getElementById('loading').innerHTML =
      '<p style="color:#74C69D;font-family:DM Mono,monospace;font-size:.8rem;">Could not load projects.json — make sure it lives in the same folder as index.html.</p>';
    return;
  }

  buildHero(data.meta);
  buildSidebar(data.projects);
  buildSlides(data.projects);
  buildFooter(data.meta);

  // Hide loading overlay
  const loader = document.getElementById('loading');
  loader.classList.add('hidden');
  setTimeout(() => loader.remove(), 500);

  // Scroll-in observer
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
  }, { threshold: 0.08 });
  document.querySelectorAll('.slide').forEach(s => io.observe(s));

  // Back-to-top
  const btt = document.getElementById('back-to-top');
  window.addEventListener('scroll', () => {
    btt.classList.toggle('visible', window.scrollY > 500);
  }, { passive: true });
}

/* ── HERO ── */
function buildHero(meta) {
  document.getElementById('hero-byline').textContent = meta.byline;
  document.getElementById('hero-desc').textContent = meta.description;

  const tallyEl = document.getElementById('hero-tally');
  meta.tallies.forEach((t, i) => {
    if (i > 0) {
      const div = document.createElement('div');
      div.className = 'tally-divider';
      tallyEl.appendChild(div);
    }
    tallyEl.insertAdjacentHTML('beforeend', `
      <div class="tally-item">
        <span class="tally-num">${t.num}</span>
        <span class="tally-label">${t.label}</span>
      </div>`);
  });
}

/* ── LEFT SIDEBAR NAV ── */
function buildSidebar(projects) {
  const el = document.getElementById('sidebar-nav');
  let currentSection = null;
  projects.forEach(p => {
    if (p.section !== currentSection) {
      if (currentSection !== null) {
        el.insertAdjacentHTML('beforeend', '<div class="nav-section-break"></div>');
      }
      currentSection = p.section;
    }
    el.insertAdjacentHTML('beforeend',
      `<a href="#${p.id}"><span class="pnum">${p.num}</span> ${stripTags(p.title)}</a>`);
  });
}

/* ── SLIDES ── */
function buildSlides(projects) {
  const main = document.getElementById('main-content');
  let currentSection = null;
  let container = null;

  projects.forEach((p) => {
    if (p.section !== currentSection) {
      currentSection = p.section;
      main.insertAdjacentHTML('beforeend', `
        <div class="sec-divider">
          <div class="sec-divider-line"></div>
          <span class="sec-divider-lbl">${p.section}</span>
          <div class="sec-divider-line"></div>
        </div>`);
      container = document.createElement('div');
      container.className = 'slides-container';
      main.appendChild(container);
    }

    const chips = p.features.map(f => `<span class="feat-chip">${f}</span>`).join('');
    const btns = p.links.map(l => {
      if (l.primary) {
        return `<a href="${l.href}" class="btn-primary"
          style="background:${p.btnBg};color:${p.btnColor};"
          ${l.external ? 'target="_blank" rel="noopener"' : ''}>${l.label}</a>`;
      }
      return `<a href="${l.href}" class="btn-secondary"
        ${l.external ? 'target="_blank" rel="noopener"' : ''}>${l.label}</a>`;
    }).join('');

    container.insertAdjacentHTML('beforeend', `
      <div class="slide" id="${p.id}" style="transition-delay:0.05s">
        <div class="slide-panel" style="background:${p.panelGradient}">
          <div>
            <span class="slide-cat" style="${p.catStyle}">${p.category}</span>
            <h2 class="slide-title">${p.title}</h2>
            <p class="slide-sub">${p.subtitle}</p>
          </div>
          <div class="slide-stat">
            <div class="slide-stat-num" style="color:${p.statColor}">${p.stat}</div>
            <div class="slide-stat-lbl">${p.statLabel}</div>
          </div>
          <div class="slide-wm">${p.num}</div>
        </div>
        <div class="slide-content">
          <div>
            <p class="slide-desc">${p.description}</p>
            <div class="slide-features">${chips}</div>
          </div>
          <div class="slide-actions">${btns}</div>
        </div>
      </div>`);
  });
}

/* ── FOOTER ── */
function buildFooter(meta) {
  const links = meta.footerLinks
    .map(l => `<a href="${l.href}" target="_blank">${l.label}</a>`)
    .join('');
  document.getElementById('site-footer').innerHTML = `
    <div class="footer-brand">MG<span>uhlin</span>.org — Creations</div>
    <div class="footer-links">${links}</div>
    <div class="footer-copy">CC0 1.0 Universal · Open for reuse</div>`;
}

/* ── UTIL ── */
function stripTags(str) { return str.replace(/<[^>]*>/g, ''); }

/* ── MOBILE SIDEBAR TOGGLE ── */
const toggle = document.getElementById('menu-toggle');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('sidebar-overlay');

function openSidebar() {
  sidebar.classList.add('open');
  toggle.classList.add('active');
  overlay.classList.add('visible');
  document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  sidebar.classList.remove('open');
  toggle.classList.remove('active');
  overlay.classList.remove('visible');
  document.body.style.overflow = '';
}

toggle.addEventListener('click', () => {
  sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
});
overlay.addEventListener('click', closeSidebar);

// Close sidebar when a nav link is clicked (mobile)
document.getElementById('sidebar-nav').addEventListener('click', (e) => {
  if (e.target.closest('a')) closeSidebar();
});

/* ── KICK OFF ── */
loadAndRender();
</script>
</body>
</html>
